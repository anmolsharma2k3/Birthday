<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Forever A❤️S</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="bg"></div><div class="overlay"></div>
<div class="wrap">

    <h3>🎂 𝓐 𝓓𝓪𝔂 𝓸𝓯 𝓜𝔂 𝓠𝓾𝓮𝓮𝓷 👸</h3>

    <h1>31 𝓐𝓾𝓰𝓾𝓼𝓽</h1>

    <div class="clock">

        <div class="card">
            <span id="days">00</span>
            <label>DAYS</label>
        </div>

        <div class="card">
            <span id="hours">00</span>
            <label>HOURS</label>
        </div>

        <div class="card">
            <span id="minutes">00</span>
            <label>MINUTES</label>
        </div>

        <div class="card">
            <span id="seconds">00</span>
            <label>SECONDS</label>
        </div>

    </div>

    <h2 id="birthdayMessage" style="display:none;">
        🎉 Happy Birthday My Heartbeat ❤️🫀
    </h2>

    <p>𝐸𝓋𝑒𝓇𝓎 𝓈𝑒𝒸𝑜𝓃𝒹 𝒷𝓇𝒾𝓃𝑔𝓈 𝓊𝓈 𝒸𝓁𝑜𝓈𝑒𝓇 ❤️</p>

    <a id="surpriseBtn" class="btn disabled">
        🔒 💫 𝓞𝓾𝓻 𝓛𝓸𝓿𝓮 𝓢𝓽𝓸𝓻𝔂 𝓑𝓮𝓰𝓲𝓷𝓼 🫀
    </a>

</div>
<div class="stars"></div>
<div class="hearts" id="hearts"></div>
<script src="script.js"></script>
</body>
</html>
